services:
  # --- App infrastructure ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: courses
      POSTGRES_USER: courses
      POSTGRES_PASSWORD: courses_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    restart: unless-stopped

  # --- Judge0 CE (code execution sandbox) ---
  judge0-server:
    image: judge0/judge0:1.13.1
    volumes:
      - ./docker/judge0.conf:/judge0.conf:ro
    ports:
      - "2358:2358"
    privileged: true
    restart: unless-stopped
    depends_on:
      - judge0-db
      - judge0-redis

  judge0-workers:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    volumes:
      - ./docker/judge0.conf:/judge0.conf:ro
    privileged: true
    restart: unless-stopped
    depends_on:
      - judge0-db
      - judge0-redis

  judge0-db:
    image: postgres:16-alpine
    env_file: ./docker/judge0.conf
    volumes:
      - judge0_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  judge0-redis:
    image: redis:7-alpine
    command: ["sh", "-c", 'redis-server --appendonly no --requirepass "$$REDIS_PASSWORD"']
    env_file: ./docker/judge0.conf
    restart: unless-stopped

volumes:
  postgres_data:
  judge0_db_data:
